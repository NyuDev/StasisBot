name: Build & Release

# Build a jar on every push to main (and on PRs, for validation). When the
# mod_version in gradle.properties changes, a matching tag/release is published
# automatically with the built jar attached.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # needed to create tags and releases

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # fetch tags so we can tell whether this version is new

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # The committed gradle.properties pins a Windows-only JVM arg
      # (-Djdk.net.unixdomain.tmpdir=C:/Temp) that is invalid on Linux. A
      # gradle.properties in GRADLE_USER_HOME overrides the project one, so we
      # drop in Linux-safe JVM args here without touching the repo file.
      - name: Configure Linux-safe Gradle JVM args
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx2G" >> ~/.gradle/gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Read mod version
        id: meta
        run: |
          version="$(grep -E '^mod_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]\r')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Detected mod version: $version"

      - name: Upload jar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stasisbot-${{ steps.meta.outputs.version }}
          path: build/libs/*.jar
          if-no-files-found: error

      # --- Release on version bump (push to main only) ---------------------
      - name: Check whether this version is already released
        id: tagcheck
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          if git rev-parse "refs/tags/${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.meta.outputs.tag }} already exists — no new release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New version ${{ steps.meta.outputs.version }} — a release will be created."
          fi

      - name: Create release
        if: steps.tagcheck.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: StasisBot ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: build/libs/stasisbot-${{ steps.meta.outputs.version }}.jar
