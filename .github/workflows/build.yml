name: Build & Release

# Builds a jar for every supported Minecraft version on each push to main (and on
# PRs, for validation). When the mod_version in gradle.properties changes, a
# matching tag/release is published automatically with every jar that compiled.
on:
  push:
    branches: [ main ]
    paths-ignore: [ '**.md' ]
  pull_request:
    branches: [ main ]
    paths-ignore: [ '**.md' ]
  workflow_dispatch:

permissions:
  contents: write   # needed to create tags and releases

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build MC ${{ matrix.mc }}
    runs-on: ubuntu-latest
    strategy:
      # Each row is an independent jar; one failing must not cancel the others.
      # Scope: 1.21.10–1.21.11. Older versions changed several APIs the bot relies on
      # (authlib GameProfile became a record, KeyBinding.Category, PlayerInventory's
      # selected-slot getters …), so supporting them would need fragile per-version
      # shims for little gain. 1.21.11 is the runtime-verified version (the VPS).
      fail-fast: false
      matrix:
        include:
          - { mc: "1.21.10", yarn: "1.21.10+build.3", fabric: "0.138.4+1.21.10" }
          - { mc: "1.21.11", yarn: "1.21.11+build.6", fabric: "0.141.4+1.21.11" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.mc }}-${{ hashFiles('**/*.gradle', 'gradle.properties') }}
          restore-keys: gradle-${{ matrix.mc }}-

      # The committed gradle.properties pins a Windows-only JVM arg
      # (-Djdk.net.unixdomain.tmpdir=C:/Temp) that is invalid on Linux. A
      # gradle.properties in GRADLE_USER_HOME overrides the project one, so we
      # drop in Linux-safe JVM args here without touching the repo file.
      - name: Configure Linux-safe Gradle JVM args
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx3G" >> ~/.gradle/gradle.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Override only the per-version coordinates; everything else (loader, mod
      # source) is shared. The committed defaults stay 1.21.11 so the VPS Docker
      # build, which never passes these, keeps building the verified version.
      # jarOnly: skip the dev-runtime mods (Meteor, ViaFabricPlus) — the jar never
      # bundles them and they're pinned to a single MC version.
      - name: Build
        run: |
          ./gradlew build \
            -Pminecraft_version=${{ matrix.mc }} \
            -Pyarn_mappings=${{ matrix.yarn }} \
            -Pfabric_version=${{ matrix.fabric }} \
            -PjarOnly \
            --stacktrace --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: stasisbot-mc${{ matrix.mc }}
          path: build/libs/*.jar
          if-no-files-found: error

  # --- Release on version bump (push to main only) -----------------------------
  release:
    name: Publish release
    needs: build
    # Run even if some matrix builds failed, so a release ships every version that
    # did compile rather than nothing.
    if: ${{ always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # fetch tags so we can tell whether this version is new

      - name: Read mod version
        id: meta
        run: |
          version="$(grep -E '^mod_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]\r')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Detected mod version: $version"

      - name: Check whether this version is already released
        id: tagcheck
        run: |
          if git rev-parse "refs/tags/${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.meta.outputs.tag }} already exists — no new release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New version ${{ steps.meta.outputs.version }} — a release will be created."
          fi

      - name: Download all build artifacts
        if: steps.tagcheck.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release jars
        if: steps.tagcheck.outputs.exists == 'false'
        run: |
          mkdir -p release
          find artifacts -name '*.jar' ! -name '*-sources.jar' -exec cp {} release/ \;
          echo "Jars to release:"
          ls -l release

      - name: Create release
        if: steps.tagcheck.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: StasisBot ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: release/*.jar
          fail_on_unmatched_files: true
