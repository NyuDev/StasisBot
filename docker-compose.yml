# StasisBot — headless on a remote server (e.g. 2b2t).
#
# FIRST RUN (one-time, interactive): DevAuth prints a microsoft.com/link code,
# open it in a browser and sign in with your Microsoft account:
#
#     docker compose run --rm stasisbot
#
# After the account token is cached (in ./run/devauth/) you can run it detached:
#
#     docker compose up -d
#     docker compose logs -f
#
# ADD / SWITCH ACCOUNT: a second account ("alt") is pre-declared in
# run/devauth/config.toml. Authenticate it once, then switch with STASIS_ACCOUNT:
#
#     docker compose stop
#     docker compose run --rm -e STASIS_ACCOUNT=alt stasisbot
#       -> DevAuth prints a microsoft.com/link code; open it on any device and
#          sign in with the OTHER Microsoft account. Wait for "Setting user: <name>",
#          then Ctrl+C.
#     echo "STASIS_ACCOUNT=alt" >> .env      # make it the account used from now on
#     docker compose up -d
#
# Switch back anytime by setting STASIS_ACCOUNT=main (or alt) in .env + `up -d`.
# (If DevAuth shows a login URL that redirects to 127.0.0.1:3000 instead of a
# code, re-run the auth over an SSH tunnel: ssh -L 3000:127.0.0.1:3000 … and add
# --service-ports to the `run` command.)
#
services:
  stasisbot:
    build: .
    image: stasisbot-headless
    container_name: stasisbot
    stdin_open: true          # keep STDIN open for the one-time OAuth prompt
    tty: true
    ports:
      # DevAuth's OAuth callback: Microsoft redirects your browser to
      # http://127.0.0.1:3000 after sign-in, which must reach the container.
      # Only needed for the one-time login; harmless to leave mapped.
      - "127.0.0.1:3000:3000"
    environment:
      # Server the bot auto-joins on launch (host or host:port). Defaults to a local
      # server; set STASIS_SERVER in a .env (or here) to your target — e.g. our VPS
      # uses STASIS_SERVER=2b2t.org.
      STASIS_SERVER: "${STASIS_SERVER:-127.0.0.1:25565}"
      # DevAuth account to log in as — see run/devauth/config.toml ("main", "alt", …).
      # Authenticate a new account once (see README), then set this to switch to it.
      STASIS_ACCOUNT: "${STASIS_ACCOUNT:-main}"
      # Client render distance (entrypoint writes it into options.txt). Kept high
      # because the bot's surveillance (player/chamber/entity watchers) only sees
      # chunks the client loads. Capped in practice by 2b2t's server view-distance.
      SB_RENDER_DISTANCE: "${SB_RENDER_DISTANCE:-32}"
      # Set to 1 to load ViaFabricPlus (connect to a server on a different protocol
      # version). Off by default — the bot runs identically without it.
      STASIS_VIA: "${STASIS_VIA:-}"
    volumes:
      # Minecraft / mappings / library caches — keeps restarts fast.
      - gradle-cache:/root/.gradle
      # Your mod config (run/config/stasisbot.json) and the DevAuth OAuth token
      # (run/devauth/) live here and persist across container restarts.
      - ./run:/app/run
    restart: unless-stopped

volumes:
  gradle-cache:
